name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install from requirements if present
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
          # Ensure required packages exist
          pip install fastapi uvicorn

      # 4. Debug: Show project structure
      - name: Show project structure
        run: |
          echo "Project structure:"
          ls -R

      # 5. Syntax check (Lint)
      - name: Python syntax check
        run: |
          python -m py_compile app/app.py
          python -m py_compile app/frontend.py
          python -m py_compile src/predict.py

      # 6. Import test
      - name: Test imports
        run: |
          python -c "from src.predict import predict_transaction; print('Import successful')"

      # 7. Start FastAPI server
      - name: Start FastAPI server
        run: |
          nohup uvicorn app.app:app --host 127.0.0.1 --port 8000 &
          sleep 5

      # 8. Health check
      - name: Health check
        run: |
          curl --fail http://127.0.0.1:8000 || exit 1

      # 9. Test API endpoints
      - name: Test API endpoints
        run: |
          curl -X POST "http://127.0.0.1:8000/init_user" \
          -H "Content-Type: application/json" \
          -d '{"user_id":"test_user","balance":10000}'

          curl -X POST "http://127.0.0.1:8000/predict" \
          -H "Content-Type: application/json" \
          -d '{"user_id":"test_user","type":"PAYMENT","amount":100,"nameDest":"M1"}'

      # 10. Success message
      - name: Done
        run: echo "CI Pipeline completed successfully!"
